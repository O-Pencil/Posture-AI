<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>3 节点零位校准 · Posture-AI</title>
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style type="text/tailwindcss">
  @theme {
    --color-canvas: #0A0F1A; --color-surface-1: #111827; --color-surface-2: #1F2937; --color-surface-raised: #0F172A;
    --color-border-subtle: #1E293B; --color-text-primary: #F1F5F9; --color-text-secondary: #94A3B8; --color-text-tertiary: #64748B;
    --color-accent-warm: #F97316; --color-status-healthy: #10B981; --color-status-warning: #F59E0B; --color-status-alert: #EF4444; --color-status-offline: #6B7280; --color-status-active: #FBBF24;
    --font-sans: "Geist", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
  }
  @layer base {
    html, body { font-family: var(--font-sans); background: var(--color-canvas); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(249, 115, 22, 0.04), transparent 60%); background-attachment: fixed; }
  }
  @keyframes scan-line { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
  .scan-line { animation: scan-line 2.5s ease-in-out infinite; }
  @keyframes countdown { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 283; } }
  .countdown-ring { animation: countdown 3s linear forwards; }
</style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center p-0 md:p-8">
<div class="w-full md:w-[390px] md:rounded-[44px] md:ring-8 md:ring-surface-2 md:shadow-2xl bg-canvas min-h-screen md:min-h-[844px] md:max-h-[844px] md:overflow-hidden relative">

  <div class="flex items-center justify-between px-6 pt-3 pb-1 text-meta font-mono text-text-secondary">
    <span>9:41</span><div class="flex items-center gap-1.5"><span>●●●</span><span>5G</span><span>89%</span></div>
  </div>

  <header class="px-6 pt-4 pb-3 flex items-center justify-between">
    <a href="dashboard.html" class="size-9 rounded-full bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center text-text-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <div class="text-h3 font-semibold">3 节点校准</div>
    <div class="size-9"></div>
  </header>

  <main class="px-6 pb-6 space-y-5">

    <!-- 步骤：3 节点 × 3 姿势 = 9 步（这次只展示一个步骤） -->
    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="text-meta font-mono text-text-tertiary">STEP 2 / 9</span>
        <span class="text-meta text-text-secondary">C7 · 前屈 30°</span>
      </div>
      <div class="flex gap-1">
        <div class="h-1 flex-1 rounded-full bg-status-healthy"></div>
        <div class="h-1 flex-1 rounded-full bg-accent-warm"></div>
        <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
        <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
        <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
        <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
        <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
        <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
        <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
      </div>
    </div>

    <!-- 3 节点状态卡（核心） -->
    <section class="bg-surface-1 ring-1 ring-border-subtle rounded-3xl p-5 relative overflow-hidden">
      <div class="absolute inset-x-0 h-px bg-gradient-to-r from-transparent via-accent-warm to-transparent scan-line"></div>
      <div class="text-meta font-mono text-accent-warm mb-1">现在校准</div>
      <h2 class="text-h2 font-bold tracking-tight mb-1">颈椎节点 C7</h2>
      <p class="text-text-secondary text-body leading-relaxed">保持背部挺直，仅低头 30°，像在看膝盖上的手机。</p>

      <!-- 人侧影示意 + 倒计时 -->
      <div class="my-5 grid grid-cols-2 gap-4 items-center">
        <div class="bg-canvas rounded-2xl p-3 flex items-center justify-center h-44">
          <svg width="120" height="160" viewBox="0 0 120 160" fill="none">
            <ellipse cx="60" cy="35" rx="13" ry="15" fill="#F1F5F9"/>
            <path d="M60 50 L 67 75 L 60 90" stroke="#F1F5F9" stroke-width="6" stroke-linecap="round" fill="none"/>
            <path d="M 50 90 L 56 90 L 60 150 L 46 150 Z" fill="#94A3B8"/>
            <path d="M 60 90 A 18 18 0 0 0 75 75" stroke="#F97316" stroke-width="2" fill="none" stroke-dasharray="3 2"/>
            <text x="80" y="92" fill="#F97316" font-family="Geist Mono" font-size="11" font-weight="700">30°</text>
          </svg>
        </div>
        <div class="flex flex-col items-center">
          <div class="relative size-28">
            <svg class="size-full -rotate-90" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="44" fill="none" stroke="#1F2937" stroke-width="6"/>
              <circle cx="50" cy="50" r="44" fill="none" stroke="#F97316" stroke-width="6" stroke-linecap="round" stroke-dasharray="276.46" stroke-dashoffset="0" class="countdown-ring"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <div class="font-mono text-3xl font-bold text-accent-warm">3</div>
              <div class="text-meta text-text-tertiary">秒</div>
            </div>
          </div>
          <div class="text-meta text-text-secondary mt-2">保持姿势</div>
        </div>
      </div>

      <!-- 3 节点实时数据 -->
      <div class="space-y-2 pt-3 border-t border-border-subtle/60">
        <div class="flex items-center gap-3">
          <span class="size-2 rounded-full bg-accent-warm"></span>
          <span class="text-meta text-text-tertiary font-mono w-12">C7</span>
          <div class="flex-1 h-1.5 rounded-full bg-surface-2 overflow-hidden">
            <div class="h-full w-[85%] bg-accent-warm rounded-full transition-all duration-200"></div>
          </div>
          <span class="font-mono text-meta font-medium text-accent-warm w-12 text-right">28.4°</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="size-2 rounded-full bg-status-healthy"></span>
          <span class="text-meta text-text-tertiary font-mono w-12">T12</span>
          <div class="flex-1 h-1.5 rounded-full bg-surface-2 overflow-hidden">
            <div class="h-full w-[8%] bg-status-healthy rounded-full transition-all duration-200"></div>
          </div>
          <span class="font-mono text-meta font-medium text-status-healthy w-12 text-right">1.2°</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="size-2 rounded-full bg-status-healthy"></span>
          <span class="text-meta text-text-tertiary font-mono w-12">L5</span>
          <div class="flex-1 h-1.5 rounded-full bg-surface-2 overflow-hidden">
            <div class="h-full w-[5%] bg-status-healthy rounded-full transition-all duration-200"></div>
          </div>
          <span class="font-mono text-meta font-medium text-status-healthy w-12 text-right">0.7°</span>
        </div>
      </div>
    </section>

    <!-- 提示：节点位置图 -->
    <section class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-4">
      <div class="flex items-start gap-3">
        <div class="size-9 rounded-xl bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center flex-shrink-0">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        </div>
        <div class="flex-1">
          <div class="text-meta font-medium text-text-primary">颈椎节点 C7 位置</div>
          <div class="text-meta text-text-secondary mt-1 leading-relaxed">大椎穴：低头时脖子后方最凸起的骨头。把板子贴上去，确保魔术贴粘紧。</div>
        </div>
      </div>
    </section>

    <div class="flex items-center gap-3">
      <button class="flex-1 bg-surface-1 hover:bg-surface-2 text-text-secondary font-medium rounded-full px-5 py-3.5 ring-1 ring-border-subtle transition-colors">
        跳过此步
      </button>
      <button class="flex-[2] bg-status-healthy hover:bg-status-healthy/90 text-canvas font-semibold rounded-full px-6 py-3.5 transition-colors">
        我保持好了
      </button>
    </div>

  </main>

  <a href="index.html" class="hidden md:flex absolute top-3 -left-14 items-center gap-1 text-meta text-text-tertiary hover:text-accent-warm transition-colors">
    ← 原型导航
  </a>
</div>
</div>
<script>
  // 校准步骤推进
  (function() {
    const steps = [
      { c7: 0,   t12: 0,   l5: 0,   pose: "直立基线",  desc: "自然站立，背挺直，目视前方" },
      { c7: 30,  t12: 0,   l5: 0,   pose: "C7 前屈 30°", desc: "仅低头，像看膝盖上的手机" },
      { c7: 0,   t12: 0,   l5: 0,   pose: "C7 回正",   desc: "回到直立位置" },
      { c7: 0,   t12: 25,  l5: 0,   pose: "T12 前屈 25°", desc: "含胸弓背，模拟驼背" },
      { c7: 0,   t12: 0,   l5: 0,   pose: "T12 回正",   desc: "回到直立" },
      { c7: 0,   t12: 0,   l5: 15,  pose: "L5 侧屈 15°",  desc: "腰部向左侧倾" },
      { c7: 0,   t12: 0,   l5: 0,   pose: "L5 回正",   desc: "回到直立" },
      { c7: 0,   t12: 0,   l5: 0,   pose: "C7 左转 30°",  desc: "头向左转" },
      { c7: 0,   t12: 0,   l5: 0,   pose: "全部完成",  desc: "校准数据已保存" },
    ];
    let cur = 1; // 显示 STEP 2 / 9
    const stepEl = document.querySelector('.text-text-secondary'); // 右上"前屈 30°"
    const stepCountEl = document.querySelectorAll('.text-meta.font-mono.text-text-tertiary')[1]; // STEP 2/9
    const nextBtn = Array.from(document.querySelectorAll('button')).find(b => b.textContent.includes('我保持好了'));
    const skipBtn = Array.from(document.querySelectorAll('button')).find(b => b.textContent.includes('跳过此步'));
    const posName = stepEl;
    function update() {
      if (cur >= 9) {
        // 完成态
        document.querySelector('h2').textContent = '校准完成';
        const desc = document.querySelector('p.text-text-secondary');
        if (desc) desc.textContent = '9 个基线点已采集。可以开始使用。';
        nextBtn.textContent = '进入仪表盘';
        nextBtn.onclick = () => location.href = 'dashboard.html';
        if (skipBtn) skipBtn.style.display = 'none';
        stepCountEl.textContent = 'STEP 9 / 9';
        posName.textContent = steps[cur].pose;
        return;
      }
      cur++;
      stepCountEl.textContent = 'STEP ' + (cur+1) + ' / 9';
      posName.textContent = steps[cur].pose;
      // 进度条第 cur 段切到 active 色
      const segs = document.querySelectorAll('.flex.gap-1 > div.h-1');
      if (segs[cur]) {
        segs[cur].classList.remove('bg-surface-2');
        segs[cur].classList.add('bg-accent-warm');
      }
      // 当前角度示例
      const c7El = document.querySelector('.flex.items-center.gap-3:nth-of-type(1) .font-mono');
      if (c7El) c7El.textContent = steps[cur].c7 + '°';
    }
    nextBtn && nextBtn.addEventListener('click', update);
    skipBtn && skipBtn.addEventListener('click', update);
  })();
</script>
</body>
</html>
