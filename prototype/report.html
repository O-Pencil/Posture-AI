<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>周报 · 月报 · Catune</title>
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style type="text/tailwindcss">
  @theme {
    --color-canvas: #0A0F1A; --color-surface-1: #111827; --color-surface-2: #1F2937; --color-surface-raised: #0F172A;
    --color-border-subtle: #1E293B; --color-text-primary: #F1F5F9; --color-text-secondary: #94A3B8; --color-text-tertiary: #64748B;
    --color-accent-warm: #F97316; --color-status-healthy: #10B981; --color-status-warning: #F59E0B; --color-status-alert: #EF4444; --color-status-offline: #6B7280; --color-status-active: #FBBF24;
    --font-sans: "Geist", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
  }
  @layer base {
    html, body { font-family: var(--font-sans); background: var(--color-canvas); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(16, 185, 129, 0.04), transparent 60%); background-attachment: fixed; }
  }
</style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center p-0 md:p-8">
<div class="w-full md:w-[390px] md:rounded-[44px] md:ring-8 md:ring-surface-2 md:shadow-2xl bg-canvas min-h-screen md:min-h-[844px] md:max-h-[844px] md:overflow-hidden relative">

<div class="flex items-center justify-between px-6 pt-3 pb-1 text-meta font-mono text-text-secondary">
  <span>9:41</span><div class="flex items-center gap-1.5"><span>●●●</span><span>5G</span><span>89%</span></div>
</div>
<header class="px-6 pt-4 pb-3 flex items-center justify-between">
  <a href="dashboard.html" class="size-9 rounded-full bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center text-text-secondary">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="text-h3 font-semibold">报告</div>
  <span class="size-9 inline-flex items-center justify-center text-text-tertiary font-mono text-meta">F6</span>
</header>
<main class="px-6 pb-6 space-y-4">
  <!-- 时间段选择 -->
  <div class="inline-flex bg-surface-2 rounded-full p-1 ring-1 ring-border-subtle">
    <button class="text-meta px-4 py-1.5 rounded-full text-text-tertiary">日</button>
    <button class="text-meta px-4 py-1.5 rounded-full bg-surface-raised text-text-primary font-medium">周</button>
    <button class="text-meta px-4 py-1.5 rounded-full text-text-tertiary">月</button>
  </div>

  <!-- 总览卡 -->
  <section class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-5">
    <div class="flex items-center justify-between mb-4">
      <div>
        <div class="text-meta text-text-tertiary font-mono">本周（06/01 – 06/07）</div>
        <div class="font-mono text-display font-bold text-status-healthy leading-none mt-1">84</div>
        <div class="text-meta text-text-tertiary">平均 Posture Score</div>
      </div>
      <div class="text-right">
        <div class="text-meta text-status-healthy font-mono">↑ 6 vs 上周</div>
      </div>
    </div>
  </section>

  <!-- 每日折线图（手画 SVG） -->
  <section class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-5">
    <div class="text-meta font-mono text-text-tertiary mb-3">DAILY SCORE</div>
    <svg viewBox="0 0 320 140" class="w-full">
      <defs>
        <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#10B981" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <line x1="0" y1="115" x2="320" y2="115" stroke="#1E293B"/>
      <line x1="0" y1="80" x2="320" y2="80" stroke="#1E293B" stroke-dasharray="2 4"/>
      <line x1="0" y1="45" x2="320" y2="45" stroke="#1E293B" stroke-dasharray="2 4"/>
      <!-- 折线 -->
      <polyline points="20,55 60,40 100,65 140,30 180,50 220,35 260,25 300,40" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polygon points="20,55 60,40 100,65 140,30 180,50 220,35 260,25 300,40 300,115 20,115" fill="url(#lineGrad)"/>
      <!-- 数据点 -->
      <circle cx="20" cy="55" r="3" fill="#10B981"/>
      <circle cx="60" cy="40" r="3" fill="#10B981"/>
      <circle cx="100" cy="65" r="3" fill="#F59E0B"/>
      <circle cx="140" cy="30" r="3" fill="#10B981"/>
      <circle cx="180" cy="50" r="3" fill="#10B981"/>
      <circle cx="220" cy="35" r="3" fill="#10B981"/>
      <circle cx="260" cy="25" r="3" fill="#10B981"/>
      <circle cx="300" cy="40" r="3" fill="#10B981"/>
      <!-- 标签 -->
      <g fill="#64748B" font-family="Geist Mono" font-size="9">
        <text x="14" y="130">一</text>
        <text x="54" y="130">二</text>
        <text x="94" y="130">三</text>
        <text x="134" y="130">四</text>
        <text x="174" y="130">五</text>
        <text x="214" y="130">六</text>
        <text x="254" y="130">日</text>
        <text x="294" y="130">今</text>
      </g>
    </svg>
  </section>

  <!-- 异常分布 -->
  <section class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-5">
    <div class="text-meta font-mono text-text-tertiary mb-3">异常分布</div>
    <div class="space-y-3">
      <div>
        <div class="flex items-center justify-between text-meta mb-1">
          <span>SLUMPED · 驼背</span>
          <span class="font-mono text-status-alert">12 次</span>
        </div>
        <div class="h-2 rounded-full bg-surface-2 overflow-hidden">
          <div class="h-full w-[60%] bg-status-alert rounded-full"></div>
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between text-meta mb-1">
          <span>TECH_NECK · 低头</span>
          <span class="font-mono text-status-warning">23 次</span>
        </div>
        <div class="h-2 rounded-full bg-surface-2 overflow-hidden">
          <div class="h-full w-[85%] bg-status-warning rounded-full"></div>
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between text-meta mb-1">
          <span>LEFT_LEAN · 侧倾</span>
          <span class="font-mono text-status-alert">4 次</span>
        </div>
        <div class="h-2 rounded-full bg-surface-2 overflow-hidden">
          <div class="h-full w-[18%] bg-status-alert rounded-full"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- AI 建议 -->
  <section class="bg-accent-warm/5 ring-1 ring-accent-warm/30 rounded-2xl p-5">
    <div class="flex items-center gap-2 mb-2">
      <span class="text-meta font-mono text-accent-warm">AI · QWEN3-VL</span>
    </div>
    <p class="text-body text-text-primary leading-relaxed">
      本周你平均每小时有 <span class="text-status-warning font-mono">3.2 次</span> 低头动作，主要集中在 <span class="text-text-primary font-medium">10:00–11:30</span> 段。建议每 45 分钟抬头看远处 30 秒，并在 L5 节点触发振动时立即调整。
    </p>
  </section>
</main>
<a href="index.html" class="hidden md:flex absolute top-3 -left-14 items-center gap-1 text-meta text-text-tertiary hover:text-accent-warm transition-colors">← 原型导航</a>
</div>
</div>
<script>
  // 周/月/日 tabs 切换
  (function() {
    const data = {
      '日': { score: 87,   delta: '+3  vs 昨天',  line: '20,55 60,40 100,65 140,30 180,50 220,35 260,25 300,40', ai: '今天你保持了 47 分钟健康坐姿。下午 14:00-15:30 段有 2 次驼背，建议每 45 分钟起来走 30 秒。' },
      '周': { score: 84,   delta: '+6  vs 上周',  line: '20,55 60,40 100,65 140,30 180,50 220,35 260,25 300,40', ai: '本周你平均每小时有 3.2 次低头动作，主要集中在 10:00–11:30 段。建议每 45 分钟抬头看远处 30 秒。' },
      '月': { score: 79,   delta: '+11 vs 上月',  line: '20,40 60,55 100,70 140,35 180,65 220,45 260,30 300,50', ai: '本月平均分 79 分比上月提升 11 分。周末（6/8, 6/15）数据缺失，可能未佩戴。' },
    };
    const tabs = document.querySelectorAll('div.inline-flex.bg-surface-2 button');
    const scoreEl = document.querySelector('.font-mono.text-display');
    const deltaEl = document.querySelector('.text-status-healthy.font-mono');
    const poly = document.querySelector('polyline');
    const polygon = document.querySelector('polygon');
    const aiP = document.querySelector('section.bg-accent-warm\/5 p');
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.textContent.trim();
        const d = data[tab]; if (!d) return;
        tabs.forEach(b => { b.className = 'text-meta px-4 py-1.5 rounded-full text-text-tertiary'; });
        btn.className = 'text-meta px-4 py-1.5 rounded-full bg-surface-raised text-text-primary font-medium';
        scoreEl.textContent = d.score;
        deltaEl.textContent = d.delta;
        poly.setAttribute('points', d.line);
        polygon.setAttribute('points', d.line + ' 300,115 20,115');
        if (aiP) aiP.textContent = d.ai;
      });
    });
  })();
</script>
</body>
</html>
