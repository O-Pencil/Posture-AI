<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>配对背带板 · Catune</title>
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style type="text/tailwindcss">
  @theme {
    --color-canvas: #0A0F1A; --color-surface-1: #111827; --color-surface-2: #1F2937; --color-surface-raised: #0F172A;
    --color-border-subtle: #1E293B; --color-text-primary: #F1F5F9; --color-text-secondary: #94A3B8; --color-text-tertiary: #64748B;
    --color-accent-warm: #F97316; --color-status-healthy: #10B981; --color-status-warning: #F59E0B; --color-status-alert: #EF4444; --color-status-offline: #6B7280; --color-status-active: #FBBF24;
    --font-sans: "Geist", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
  }
  @layer base {
    html, body { font-family: var(--font-sans); background: var(--color-canvas); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(16, 185, 129, 0.05), transparent 60%); background-attachment: fixed; }
  }
  @keyframes radar-sweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .radar-sweep { animation: radar-sweep 2.5s linear infinite; transform-origin: 100px 100px; }
  @keyframes radar-ping { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }
  .radar-ping { animation: radar-ping 2s ease-out infinite; }
</style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center p-0 md:p-8">
<div class="w-full md:w-[390px] md:rounded-[44px] md:ring-8 md:ring-surface-2 md:shadow-2xl bg-canvas min-h-screen md:min-h-[844px] md:max-h-[844px] md:overflow-hidden relative">

  <div class="flex items-center justify-between px-6 pt-3 pb-1 text-meta font-mono text-text-secondary">
    <span>9:41</span><div class="flex items-center gap-1.5"><span>●●●</span><span>5G</span><span>89%</span></div>
  </div>

  <header class="px-6 pt-4 pb-3 flex items-center justify-between">
    <a href="dashboard-empty.html" class="size-9 rounded-full bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center text-text-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <div class="text-h3 font-semibold">配对背带板</div>
    <a href="settings.html" class="size-9 rounded-full bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center text-text-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M21 12c0 1-1 2-1 3s1 2 1 3-1 2-1 3-2 1-3 1-2 1-3 1-2-1-3-1-2 1-3 1-2-1-3-1-2-1-3-1-1-2-1-3 1-2 1-3-1-2-1-3 1-2 1-3 2-1 3-1 2-1 3-1 2 1 3 1 2 1 3 1 2-1 3-1 2 1 3 1"/></svg>
    </a>
  </header>

  <main class="px-6 pb-6 space-y-4">

    <!-- 步骤指示 -->
    <div class="flex items-center gap-2">
      <div class="h-1 flex-1 rounded-full bg-accent-warm"></div>
      <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
      <div class="h-1 flex-1 rounded-full bg-surface-2"></div>
    </div>
    <div class="text-meta text-text-tertiary font-mono">STEP 1 / 3 · 扫描中</div>

    <!-- 雷达扫描动画 -->
    <section class="bg-surface-1 ring-1 ring-border-subtle rounded-3xl p-6 flex flex-col items-center">
      <div class="text-meta font-mono text-text-tertiary mb-1">SCANNING</div>
      <div class="text-h2 font-semibold mb-1">寻找背带板</div>
      <div class="text-meta text-text-secondary text-center mb-5">确保板子已开机（指示灯慢闪绿光）<br/>且距手机 1 米内</div>

      <div class="relative size-56 my-2">
        <!-- 雷达圈 -->
        <div class="absolute inset-0 rounded-full border border-border-subtle"></div>
        <div class="absolute inset-4 rounded-full border border-border-subtle/60"></div>
        <div class="absolute inset-12 rounded-full border border-border-subtle/40"></div>
        <div class="absolute inset-20 rounded-full border border-border-subtle/20"></div>
        <!-- 扫描线 -->
        <svg class="absolute inset-0" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#10B981" stop-opacity="0"/>
              <stop offset="100%" stop-color="#10B981" stop-opacity="0.6"/>
            </linearGradient>
          </defs>
          <path d="M 100 100 L 100 0 A 100 100 0 0 1 186 60 Z" fill="url(#grad)" class="radar-sweep"/>
        </svg>
        <!-- 中心点 -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 size-3 rounded-full bg-status-healthy"></div>
        <!-- 发现的设备 -->
        <div class="absolute top-12 left-1/2 -translate-x-1/2 -translate-y-1/2">
          <div class="relative">
            <div class="absolute inset-0 size-3 rounded-full bg-status-healthy/40 radar-ping"></div>
            <div class="relative size-3 rounded-full bg-status-healthy"></div>
          </div>
        </div>
        <div class="absolute bottom-14 right-12">
          <div class="relative">
            <div class="absolute inset-0 size-2 rounded-full bg-status-offline/40 radar-ping" style="animation-delay: 0.6s;"></div>
            <div class="relative size-2 rounded-full bg-status-offline"></div>
          </div>
        </div>
      </div>

      <div class="text-meta text-text-tertiary font-mono">2 devices found · 2.4 GHz BLE</div>
    </section>

    <!-- 发现的设备列表 -->
    <section>
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-h3 font-semibold">附近的设备</h3>
        <span class="text-meta text-text-tertiary">2</span>
      </div>

      <div class="space-y-2.5">
        <!-- 推荐的板子 -->
        <button class="w-full bg-status-healthy/5 ring-2 ring-status-healthy/40 rounded-2xl p-4 text-left flex items-center gap-3 hover:bg-status-healthy/10 transition-colors">
          <div class="size-11 rounded-xl bg-accent-warm/15 ring-1 ring-accent-warm/30 flex items-center justify-center flex-shrink-0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="2"/><circle cx="8" cy="12" r="1.5" fill="#F97316"/><circle cx="16" cy="12" r="1.5" fill="#F97316"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-body font-semibold">PoseMaster-C6</span>
              <span class="text-[10px] px-1.5 py-0.5 rounded bg-status-healthy/20 text-status-healthy font-medium">推荐</span>
            </div>
            <div class="text-meta text-text-tertiary font-mono mt-0.5">3 节点 · 信号 -52dBm · 72%</div>
          </div>
          <svg class="text-status-healthy" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

        <!-- 其他设备 -->
        <button class="w-full bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-4 text-left flex items-center gap-3 hover:bg-surface-2 transition-colors">
          <div class="size-11 rounded-xl bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center flex-shrink-0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><path d="M6.5 12c.94-3.46 4.94-6 8.5-6 3.56 0 6.06 2.54 7 6-.94 3.47-3.44 6-7 6s-7.56-2.53-8.5-6Z"/><circle cx="12" cy="12" r="2"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-body font-medium text-text-secondary">Omni-Posture-Spine</div>
            <div class="text-meta text-text-tertiary font-mono mt-0.5">3 节点 · 信号 -78dBm · 41%</div>
          </div>
          <svg class="text-text-tertiary" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </section>

    <!-- 帮助 -->
    <details class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl px-4 py-3">
      <summary class="text-meta text-text-secondary cursor-pointer flex items-center justify-between">
        <span>找不到我的板子？</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </summary>
      <div class="mt-3 text-meta text-text-secondary leading-relaxed space-y-1.5">
        <p>· 长按板子主控侧按钮 3 秒开机</p>
        <p>· 指示灯慢闪绿光 = 可发现</p>
        <p>· 距手机 1 米内、避开金属遮挡</p>
        <p>· 手机需开启蓝牙与位置权限</p>
      </div>
    </details>

  </main>

  <a href="index.html" class="hidden md:flex absolute top-3 -left-14 items-center gap-1 text-meta text-text-tertiary hover:text-accent-warm transition-colors">
    ← 原型导航
  </a>
</div>
</div>
<script>
  // 雷达扫描 2s 后"发现"设备
  (function() {
    const stepEl = document.querySelector('.text-meta.text-text-tertiary.font-mono');
    const scanEl = document.querySelector('.text-h2.font-semibold.mb-1');
    const detailEl = document.querySelector('.text-meta.text-text-secondary.text-center.mb-5');
    const counterEl = Array.from(document.querySelectorAll('.text-meta.text-text-tertiary.font-mono')).find(e => e.textContent.includes('devices found'));
    setTimeout(() => {
      if (stepEl) stepEl.textContent = 'STEP 1 / 3 · 已发现';
      if (scanEl) scanEl.textContent = '已找到 1 台设备';
      if (detailEl) detailEl.innerHTML = '找到你的 <span class="text-accent-warm font-medium">PoseMaster-C6</span>。点下面的按钮配对。';
      if (counterEl) counterEl.textContent = '1 device found · 2.4 GHz BLE · 2.4s';
    }, 2000);
  })();
</script>
</body>
</html>
