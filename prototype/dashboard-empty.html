<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>开箱首启 · Posture-AI</title>
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style type="text/tailwindcss">
  @theme {
    --color-canvas: #0A0F1A; --color-surface-1: #111827; --color-surface-2: #1F2937; --color-surface-raised: #0F172A;
    --color-border-subtle: #1E293B; --color-text-primary: #F1F5F9; --color-text-secondary: #94A3B8; --color-text-tertiary: #64748B;
    --color-accent-warm: #F97316; --color-status-healthy: #10B981; --color-status-warning: #F59E0B; --color-status-alert: #EF4444; --color-status-offline: #6B7280; --color-status-active: #FBBF24;
    --font-sans: "Geist", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
  }
  @layer base {
    html, body { font-family: var(--font-sans); background: var(--color-canvas); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(249, 115, 22, 0.05), transparent 60%); background-attachment: fixed; }
  }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .float { animation: float 4s ease-in-out infinite; }
</style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center p-0 md:p-8">
<div class="w-full md:w-[390px] md:rounded-[44px] md:ring-8 md:ring-surface-2 md:shadow-2xl bg-canvas min-h-screen md:min-h-[844px] md:max-h-[844px] md:overflow-hidden relative">

  <div class="flex items-center justify-between px-6 pt-3 pb-1 text-meta font-mono text-text-secondary">
    <span>9:41</span><div class="flex items-center gap-1.5"><span>●●●</span><span>5G</span><span>89%</span></div>
  </div>

  <header class="px-6 pt-4 pb-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="size-9 rounded-xl bg-accent-warm/10 ring-1 ring-accent-warm/30 flex items-center justify-center">
        <span class="text-accent-warm font-bold text-lg">P</span>
      </div>
      <div class="text-h3 font-semibold tracking-tight">Posture-AI</div>
    </div>
    <a href="settings.html" class="size-9 rounded-full bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center text-text-tertiary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>
  </header>

  <main class="px-6 pb-6 space-y-5">

    <!-- 空态主插画：3 节点板子示意图（SVG 简笔） -->
    <section class="pt-6 flex justify-center">
      <div class="float">
        <svg width="180" height="240" viewBox="0 0 180 240" fill="none">
          <!-- 背带底色 -->
          <rect x="50" y="30" width="80" height="180" rx="40" fill="#1F2937" stroke="#1E293B" stroke-width="2"/>
          <rect x="55" y="40" width="70" height="160" rx="35" fill="#0F172A"/>
          <!-- 节点 C7 -->
          <rect x="65" y="60" width="50" height="36" rx="8" fill="#111827" stroke="#F97316" stroke-width="2"/>
          <circle cx="74" cy="78" r="3" fill="#10B981"/>
          <text x="84" y="82" fill="#F97316" font-family="Geist Mono" font-size="10" font-weight="700">C7</text>
          <!-- 节点 T12 -->
          <rect x="65" y="108" width="50" height="36" rx="8" fill="#111827" stroke="#1E293B" stroke-width="2"/>
          <circle cx="74" cy="126" r="3" fill="#6B7280"/>
          <text x="84" y="130" fill="#94A3B8" font-family="Geist Mono" font-size="10">T12</text>
          <!-- 节点 L5 -->
          <rect x="65" y="156" width="50" height="36" rx="8" fill="#111827" stroke="#1E293B" stroke-width="2"/>
          <circle cx="74" cy="174" r="3" fill="#6B7280"/>
          <text x="84" y="178" fill="#94A3B8" font-family="Geist Mono" font-size="10">L5</text>
          <!-- 蓝牙信号波 -->
          <path d="M 130 78 Q 145 78 145 65 Q 145 78 160 78" stroke="#F97316" stroke-width="1.5" fill="none" opacity="0.7"/>
          <path d="M 130 78 Q 150 78 150 60 Q 150 78 170 78" stroke="#F97316" stroke-width="1.5" fill="none" opacity="0.4"/>
        </svg>
      </div>
    </section>

    <section class="text-center">
      <h1 class="text-h1 font-bold tracking-tight">连接你的背带板</h1>
      <p class="text-text-secondary text-body mt-3 max-w-xs mx-auto leading-relaxed">
        板子还没配对。完成下面 3 步就能开始用。
      </p>
    </section>

    <!-- 3 步引导 -->
    <section class="space-y-3">
      <div class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-4 flex items-start gap-3">
        <div class="size-9 rounded-full bg-accent-warm/15 ring-1 ring-accent-warm/30 flex items-center justify-center text-accent-warm font-mono font-bold flex-shrink-0">1</div>
        <div class="flex-1">
          <div class="text-body font-semibold">长按板子主控按钮 3 秒</div>
          <div class="text-meta text-text-secondary mt-0.5">指示灯慢闪绿光表示可发现</div>
        </div>
        <span class="size-2 rounded-full bg-status-healthy mt-3"></span>
      </div>
      <div class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-4 flex items-start gap-3">
        <div class="size-9 rounded-full bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center text-text-tertiary font-mono font-bold flex-shrink-0">2</div>
        <div class="flex-1">
          <div class="text-body font-semibold">把手机靠近板子（&lt; 1 米）</div>
          <div class="text-meta text-text-secondary mt-0.5">点下面的按钮开始扫描</div>
        </div>
        <span class="size-2 rounded-full bg-surface-2 mt-3"></span>
      </div>
      <div class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-4 flex items-start gap-3">
        <div class="size-9 rounded-full bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center text-text-tertiary font-mono font-bold flex-shrink-0">3</div>
        <div class="flex-1">
          <div class="text-body font-semibold">校准 + 选佩戴位置</div>
          <div class="text-meta text-text-secondary mt-0.5">配对成功后会自动引导</div>
        </div>
        <span class="size-2 rounded-full bg-surface-2 mt-3"></span>
      </div>
    </section>

    <a href="pairing.html" class="block w-full text-center bg-accent-warm hover:bg-accent-warm/90 text-white font-medium rounded-full px-6 py-3.5 transition-colors">
      开始扫描配对 →
    </a>

    <p class="text-meta text-text-tertiary text-center">
      已经有账户？<a href="dashboard.html" class="text-accent-warm">查看演示仪表盘</a>
    </p>

  </main>

  <a href="index.html" class="hidden md:flex absolute top-3 -left-14 items-center gap-1 text-meta text-text-tertiary hover:text-accent-warm transition-colors">
    ← 原型导航
  </a>
</div>
</div>
<script>
  // 3 步引导点击推进（点 step N → 标记 N 完成，让 step N+1 高亮）
  (function() {
    const steps = document.querySelectorAll('section.space-y-3 > div.bg-surface-1');
    if (steps.length < 3) return;
    const labels = ['开板子', '靠近手机', '校准'];
    steps.forEach((step, i) => {
      step.style.cursor = 'pointer';
      step.addEventListener('click', () => {
        // 标记前 i 步完成
        for (let j = 0; j < steps.length; j++) {
          const num = steps[j].querySelector('.font-mono.font-bold');
          const dot = steps[j].querySelector('.size-2.rounded-full');
          if (j < i) {
            // 完成
            if (num) { num.textContent = '✓'; num.className = 'font-mono font-bold text-status-healthy'; }
            steps[j].classList.add('opacity-50');
            if (dot) dot.className = 'size-2 rounded-full bg-status-healthy mt-3';
          } else if (j === i) {
            if (num) { num.textContent = String(j+1); num.className = 'font-mono font-bold text-accent-warm'; }
            steps[j].classList.remove('opacity-50');
            if (dot) dot.className = 'size-2 rounded-full bg-accent-warm mt-3';
          } else {
            if (num) { num.textContent = String(j+1); num.className = 'font-mono font-bold text-text-tertiary'; }
            steps[j].classList.remove('opacity-50');
            if (dot) dot.className = 'size-2 rounded-full bg-surface-2 mt-3';
          }
        }
        if (i >= 2) {
          // 全部完成
          const btn = document.querySelector('a.bg-accent-warm');
          if (btn) { btn.textContent = '进入校准 →'; btn.href = 'calibration.html'; }
        }
      });
    });
  })();
</script>
</body>
</html>
