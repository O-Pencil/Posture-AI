<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>实时姿态仪表盘 · Posture-AI</title>
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style type="text/tailwindcss">
  @theme {
    --color-canvas: #0A0F1A; --color-surface-1: #111827; --color-surface-2: #1F2937; --color-surface-raised: #0F172A;
    --color-border-subtle: #1E293B; --color-text-primary: #F1F5F9; --color-text-secondary: #94A3B8; --color-text-tertiary: #64748B;
    --color-accent-warm: #F97316; --color-status-healthy: #10B981; --color-status-warning: #F59E0B; --color-status-alert: #EF4444; --color-status-offline: #6B7280; --color-status-active: #FBBF24;
    --font-sans: "Geist", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
  }
  @layer base {
    html, body { font-family: var(--font-sans); background: var(--color-canvas); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(16, 185, 129, 0.05), transparent 60%); background-attachment: fixed; }
  }
  .score-ring { transform: rotate(-90deg); }
  .score-ring circle { transition: stroke-dashoffset 600ms cubic-bezier(0.4, 0, 0.2, 1); }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes spine-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
  .spine-live circle { animation: spine-bob 3s ease-in-out infinite; transform-origin: center; }
  .spine-live circle:nth-child(3) { animation-delay: 0.4s; }
  .spine-live circle:nth-child(5) { animation-delay: 0.8s; }
</style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center p-0 md:p-8">
<div class="w-full md:w-[390px] md:rounded-[44px] md:ring-8 md:ring-surface-2 md:shadow-2xl bg-canvas min-h-screen md:min-h-[844px] md:max-h-[844px] md:overflow-hidden relative">

  <!-- 状态栏 -->
  <div class="flex items-center justify-between px-6 pt-3 pb-1 text-meta font-mono text-text-secondary">
    <span>9:41</span>
    <div class="flex items-center gap-1.5"><span>●●●</span><span>5G</span><span>89%</span></div>
  </div>

  <!-- 顶栏：板子状态 + 设置 -->
  <header class="px-6 pt-4 pb-3">
    <div class="flex items-center justify-between mb-3">
      <div>
        <div class="text-meta text-text-tertiary font-mono">POSTURE-AI</div>
        <div class="text-h3 font-semibold tracking-tight">下午好，<span class="text-text-primary">小宇</span></div>
      </div>
      <a href="settings.html" class="size-9 rounded-full bg-surface-2 ring-1 ring-border-subtle flex items-center justify-center text-text-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </a>
    </div>

    <!-- 板子状态条（关键：一眼看到板子状态） -->
    <a href="settings.html" class="flex items-center gap-3 bg-surface-1 hover:bg-surface-2 ring-1 ring-border-subtle rounded-2xl px-4 py-3 transition-colors">
      <!-- 板子小图标 -->
      <div class="size-9 rounded-xl bg-accent-warm/10 ring-1 ring-accent-warm/30 flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="2"/><circle cx="8" cy="12" r="1.5" fill="#F97316"/><circle cx="16" cy="12" r="1.5" fill="#F97316"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <span class="text-body font-semibold">PoseMaster-C6</span>
          <span class="inline-block size-1.5 rounded-full bg-status-healthy pulse-dot"></span>
        </div>
        <div class="text-meta text-text-tertiary font-mono">3 节点 · 信号 -52dBm · 固件 v1.2.3</div>
      </div>
      <!-- 电量 -->
      <div class="flex flex-col items-end">
        <div class="flex items-center gap-1">
          <svg width="18" height="10" viewBox="0 0 22 12" fill="none">
            <rect x="0.5" y="0.5" width="18" height="11" rx="2" stroke="#94A3B8"/>
            <rect x="20" y="4" width="2" height="4" rx="1" fill="#94A3B8"/>
            <rect x="2" y="2" width="13" height="8" rx="1" fill="#10B981"/>
          </svg>
          <span class="text-meta font-mono font-medium">72%</span>
        </div>
        <span class="text-[10px] text-text-tertiary font-mono">~ 4h</span>
      </div>
    </a>
  </header>

  <main class="px-6 pb-6 space-y-4">

    <!-- Posture Score 大环 + 3 节点可视化（核心） -->
    <section class="bg-surface-1 ring-1 ring-border-subtle rounded-3xl p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <div class="text-meta font-mono text-text-tertiary">POSTURE SCORE</div>
          <div class="text-meta text-text-secondary">已保持健康坐姿 47 分钟</div>
        </div>
        <span class="inline-flex items-center gap-1.5 rounded-full bg-status-healthy/10 ring-1 ring-status-healthy/30 px-2.5 py-1 text-meta font-medium text-status-healthy">
          <span class="size-1.5 rounded-full bg-status-healthy pulse-dot"></span>
          NORMAL
        </span>
      </div>

      <div class="flex items-center gap-5">
        <!-- 左侧：3 节点脊柱可视化 -->
        <div class="relative size-32 flex-shrink-0">
          <svg viewBox="0 0 100 200" class="w-full h-full spine-live">
            <!-- 背景脊柱 -->
            <line x1="50" y1="20" x2="50" y2="180" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
            <!-- C7 节点（颈椎） -->
            <circle cx="50" cy="40" r="9" fill="#F59E0B"/>
            <circle cx="50" cy="40" r="13" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.4"/>
            <!-- T12 节点（胸椎） -->
            <circle cx="50" cy="100" r="9" fill="#10B981"/>
            <circle cx="50" cy="100" r="13" fill="none" stroke="#10B981" stroke-width="2" opacity="0.4"/>
            <!-- L5 节点（腰椎） -->
            <circle cx="53" cy="160" r="9" fill="#F59E0B"/>
            <circle cx="53" cy="160" r="13" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.4"/>
            <!-- 偏移指示（说明 L5 略偏右） -->
            <line x1="65" y1="40" x2="80" y2="42" stroke="#F59E0B" stroke-width="1" stroke-dasharray="2 2"/>
            <line x1="65" y1="160" x2="82" y2="158" stroke="#F59E0B" stroke-width="1" stroke-dasharray="2 2"/>
          </svg>
        </div>
        <!-- 右侧：3 节点角度 -->
        <div class="flex-1 space-y-2.5">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-meta font-mono text-text-tertiary">C7</div>
              <div class="text-meta text-text-secondary">颈椎前倾</div>
            </div>
            <div class="flex items-baseline gap-0.5">
              <span class="font-mono text-h2 font-bold text-status-warning">12.4°</span>
            </div>
          </div>
          <div class="h-px bg-border-subtle"></div>
          <div class="flex items-center justify-between">
            <div>
              <div class="text-meta font-mono text-text-tertiary">T12</div>
              <div class="text-meta text-text-secondary">胸椎侧倾</div>
            </div>
            <div class="flex items-baseline gap-0.5">
              <span class="font-mono text-h2 font-bold text-status-healthy">3.1°</span>
            </div>
          </div>
          <div class="h-px bg-border-subtle"></div>
          <div class="flex items-center justify-between">
            <div>
              <div class="text-meta font-mono text-text-tertiary">L5</div>
              <div class="text-meta text-text-secondary">腰椎侧倾</div>
            </div>
            <div class="flex items-baseline gap-0.5">
              <span class="font-mono text-h2 font-bold text-status-warning">9.8°</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Posture Score 圆环 + 数字 -->
      <div class="mt-6 pt-5 border-t border-border-subtle/60 flex items-center justify-between">
        <div>
          <div class="font-mono text-display font-bold text-status-healthy leading-none">87</div>
          <div class="text-meta text-text-tertiary mt-1">综合得分 · 满分 100</div>
        </div>
        <div class="flex flex-col items-end gap-1.5">
          <span class="text-meta text-text-secondary">轻微前倾</span>
          <a href="calibration.html" class="text-meta text-accent-warm font-medium">重新校准 →</a>
        </div>
      </div>
    </section>

    <!-- 振动反馈快捷 -->
    <section class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-4 flex items-center gap-4">
      <div class="size-11 rounded-xl bg-accent-warm/10 ring-1 ring-accent-warm/30 flex items-center justify-center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
      </div>
      <div class="flex-1">
        <div class="text-body font-semibold">振动反馈</div>
        <div class="text-meta text-text-secondary">下次姿态异常时通过 L5 节点马达提醒</div>
      </div>
      <!-- 开关 -->
      <button class="relative w-11 h-6 rounded-full bg-accent-warm transition-colors">
        <span class="absolute right-0.5 top-0.5 size-5 rounded-full bg-white shadow"></span>
      </button>
    </section>

    <!-- 今日统计 -->
    <section class="bg-surface-1 ring-1 ring-border-subtle rounded-2xl p-5">
      <div class="flex items-baseline justify-between mb-4">
        <h3 class="text-h3 font-semibold">今日</h3>
        <span class="text-meta text-text-tertiary font-mono">06/05</span>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div>
          <div class="font-mono text-h2 font-bold">4<span class="text-meta text-text-tertiary">h</span> 12<span class="text-meta text-text-tertiary">m</span></div>
          <div class="text-meta text-text-secondary mt-1">总时长</div>
        </div>
        <div>
          <div class="font-mono text-h2 font-bold text-status-alert">7</div>
          <div class="text-meta text-text-secondary mt-1">异常次数</div>
        </div>
        <div>
          <div class="font-mono text-h2 font-bold text-status-warning">12<span class="text-meta text-text-tertiary">m</span></div>
          <div class="text-meta text-text-secondary mt-1">最长不良</div>
        </div>
      </div>
      <!-- 24h 热力条 -->
      <div class="mt-5">
        <div class="text-meta text-text-tertiary mb-2 font-mono">HOURLY · 24h</div>
        <div class="flex gap-0.5 h-8">
          <div class="flex-1 rounded-sm bg-surface-2"></div>
          <div class="flex-1 rounded-sm bg-surface-2"></div>
          <div class="flex-1 rounded-sm bg-surface-2"></div>
          <div class="flex-1 rounded-sm bg-surface-2"></div>
          <div class="flex-1 rounded-sm bg-surface-2"></div>
          <div class="flex-1 rounded-sm bg-surface-2"></div>
          <div class="flex-1 rounded-sm bg-surface-2"></div>
          <div class="flex-1 rounded-sm bg-status-healthy"></div>
          <div class="flex-1 rounded-sm bg-status-healthy"></div>
          <div class="flex-1 rounded-sm bg-status-warning"></div>
          <div class="flex-1 rounded-sm bg-status-alert"></div>
          <div class="flex-1 rounded-sm bg-status-warning"></div>
          <div class="flex-1 rounded-sm bg-status-warning"></div>
          <div class="flex-1 rounded-sm bg-status-alert"></div>
          <div class="flex-1 rounded-sm bg-status-alert"></div>
          <div class="flex-1 rounded-sm bg-status-warning"></div>
          <div class="flex-1 rounded-sm bg-status-healthy"></div>
          <div class="flex-1 rounded-sm bg-status-healthy"></div>
          <div class="flex-1 rounded-sm bg-status-healthy"></div>
          <div class="flex-1 rounded-sm bg-status-warning"></div>
          <div class="flex-1 rounded-sm bg-status-warning"></div>
          <div class="flex-1 rounded-sm bg-status-healthy"></div>
          <div class="flex-1 rounded-sm bg-status-healthy"></div>
          <div class="flex-1 rounded-sm bg-status-healthy"></div>
        </div>
      </div>
    </section>

    <!-- 快捷入口 -->
    <section class="grid grid-cols-4 gap-2">
      <a href="pairing.html" class="bg-surface-1 hover:bg-surface-2 ring-1 ring-border-subtle rounded-2xl py-3 px-2 flex flex-col items-center gap-1.5 transition-colors">
        <svg class="text-text-secondary" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 12c.94-3.46 4.94-6 8.5-6 3.56 0 6.06 2.54 7 6-.94 3.47-3.44 6-7 6s-7.56-2.53-8.5-6Z"/><circle cx="12" cy="12" r="2"/></svg>
        <span class="text-[10px] text-text-secondary">配对</span>
      </a>
      <a href="mock-console.html" class="bg-surface-1 hover:bg-surface-2 ring-1 ring-border-subtle rounded-2xl py-3 px-2 flex flex-col items-center gap-1.5 transition-colors">
        <svg class="text-text-secondary" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <span class="text-[10px] text-text-secondary">演示</span>
      </a>
      <a href="mcp-service.html" class="bg-surface-1 hover:bg-surface-2 ring-1 ring-border-subtle rounded-2xl py-3 px-2 flex flex-col items-center gap-1.5 transition-colors">
        <svg class="text-text-secondary" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><path d="M6 6h.01M6 18h.01"/></svg>
        <span class="text-[10px] text-text-secondary">MCP</span>
      </a>
      <a href="report.html" class="bg-surface-1 hover:bg-surface-2 ring-1 ring-border-subtle rounded-2xl py-3 px-2 flex flex-col items-center gap-1.5 transition-colors">
        <svg class="text-text-secondary" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
        <span class="text-[10px] text-text-secondary">报告</span>
      </a>
    </section>

  </main>

  <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 rounded-full bg-text-primary/30"></div>

  <a href="index.html" class="hidden md:flex absolute top-3 -left-14 items-center gap-1 text-meta text-text-tertiary hover:text-accent-warm transition-colors">
    ← 原型导航
  </a>
</div>
</div>
<script>
  // Dashboard 实时角度微抖动（模拟 live）
  (function() {
    const c7El = document.querySelectorAll('.font-mono.text-h2.font-bold.text-status-warning')[0];
    const t12El = document.querySelectorAll('.font-mono.text-h2.font-bold.text-status-healthy')[0];
    const l5El = document.querySelectorAll('.font-mono.text-h2.font-bold.text-status-warning')[1];
    if (!c7El) return;
    let c7 = 12.4, t12 = 3.1, l5 = 9.8;
    function jitter(v, range) { return Math.max(0, +(v + (Math.random() - 0.5) * range).toFixed(1)); }
    setInterval(() => {
      c7 = jitter(c7, 0.4); t12 = jitter(t12, 0.2); l5 = jitter(l5, 0.3);
      c7El.textContent = c7.toFixed(1) + '°';
      if (t12El) t12El.textContent = t12.toFixed(1) + '°';
      if (l5El) l5El.textContent = l5.toFixed(1) + '°';
    }, 1800);
  })();
</script>
</body>
</html>
